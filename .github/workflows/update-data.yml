name: Update Store Data

on:
  schedule:
    # Run at 15:00 UTC (Midnight KST) every day
    - cron: '0 15 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Crawler and Geocoder
        run: npm run update-data

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code public/data.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data.json
          git commit -m "chore(data): auto-update store data and coordinates"
          git push
