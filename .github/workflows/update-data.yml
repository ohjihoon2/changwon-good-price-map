name: Weekly Crawler Data Update

on:
  schedule:
    # 매주 월요일 새벽 3시 KST (UTC 기준 일요일 18:00)
    - cron: '0 18 * * 0'
  workflow_dispatch: # 수동 실행 옵션 추가

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 최신 LTS 버전
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Crawler
        run: node scripts/crawler.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          
          # 변경사항이 있는지 확인 후 커밋 (에러 방지)
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore(data): weekly update of good price store data"
            git push
          else
            echo "No changes to commit"
          fi
